# ArgoUI — shared-tech webapp deployment.
#
# Network model:
#   network_mode: host  — the container shares the host's network namespace.
#   The server binds 127.0.0.1:${ARGOUI_PORT} of the host, so:
#     • Reach a host-side local LLM (Ollama, LM Studio) at 127.0.0.1 — no
#       container-to-host NAT gymnastics.
#     • The webapp is NOT exposed to the host's external interfaces. Put
#       a reverse proxy (nginx, caddy, traefik) in front of 127.0.0.1:3000
#       to publish https://argoui.internal/ to your techs with TLS + auth.
#
# Persistent state:
#   Named volume `argoui-data` mounts the user's config dir, which is where
#   the SQLite DB, encrypted-or-base64 config, and builtin-skills cache
#   live. Snapshot or back this up like any other database volume.
#
# safeStorage caveat:
#   safeStorage requires an OS keychain. There is none inside a container,
#   so config falls back to the legacy base64 codec with a warning. This is
#   acceptable for a shared deployment (no per-user keychain to leverage)
#   but means the persistent volume should be treated as sensitive at rest
#   — encrypt the volume backing store via host disk encryption.

services:
  argoui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_VERSION: ${BUN_VERSION:-1.3.13}
    image: argoui:${ARGOUI_TAG:-local}
    container_name: argoui
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: ${ARGOUI_PORT:-3000}
      NODE_ENV: production
    volumes:
      - argoui-data:/home/argo/.config/ArgoUI
    # Drop all Linux capabilities except those Bun/Node legitimately need
    # to bind a port and read the filesystem.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    # Writable scratch space for tmpfile dance (sqlite WAL checkpoint, etc).
    # /home/argo/.config/ArgoUI is the named volume above; everything else
    # the runtime touches lives there.
    tmpfs:
      - /tmp:size=64m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  argoui-data:
    driver: local
